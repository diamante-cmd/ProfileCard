<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Item Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --card-bg: #ffffff;
      --page-bg: #f5f4f0;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --text-1: #1a1a18;
      --text-2: #5f5e5a;
      --text-3: #9b9a96;
      --accent: #185fa5;
      --accent-bg: #e6f1fb;
      --accent-text: #0c447c;
      --focus-ring: #185fa5;

      /* Priority */
      --high-bg: #faece7; --high-text: #993c1d; --high-border: #d85a30;
      --med-bg:  #faeeda; --med-text:  #854f0b; --med-border:  #ba7517;
      --low-bg:  #eaf3de; --low-text:  #3b6d11; --low-border:  #639922;

      /* Status */
      --done-bg:     #e1f5ee; --done-text:     #0f6e56;
      --pending-bg:  #f1efe8; --pending-text:  #5f5e5a;
      --progress-bg: #e6f1fb; --progress-text: #185fa5;

      /* Overdue */
      --overdue-bg: #faece7; --overdue-text: #993c1d; --overdue-border: #d85a30;

      --radius-card: 16px;
      --radius-badge: 20px;
      --radius-btn: 8px;

      /* Priority left-border accents */
      --pri-indicator-high: #d85a30;
      --pri-indicator-med:  #ba7517;
      --pri-indicator-low:  #639922;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --card-bg: #1e1e1c;
        --page-bg: #141412;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.28);
        --text-1: #f0ede8;
        --text-2: #a09e99;
        --text-3: #686763;
        --accent: #378add;
        --accent-bg: #0c2a42;
        --accent-text: #85b7eb;
        --focus-ring: #378add;

        --high-bg: #3a1b10; --high-text: #f0997b; --high-border: #993c1d;
        --med-bg:  #35250a; --med-text:  #fac775; --med-border:  #854f0b;
        --low-bg:  #1a2e0a; --low-text:  #97c459; --low-border:  #3b6d11;

        --done-bg:     #062920; --done-text:     #5dcaa5;
        --pending-bg:  #282826; --pending-text:  #a09e99;
        --progress-bg: #0c2a42; --progress-text: #85b7eb;

        --overdue-bg: #3a1b10; --overdue-text: #f0997b; --overdue-border: #993c1d;

        --pri-indicator-high: #f0997b;
        --pri-indicator-med:  #fac775;
        --pri-indicator-low:  #97c459;
      }
    }

    /* ── Screen-reader only ───────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap;
    }

    /* ── Layout ──────────────────────────────────────── */
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    /* ── Card ─────────────────────────────────────────── */
    article[data-testid="test-todo-card"] {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 0;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      transition: border-color 0.2s ease, opacity 0.3s ease;
    }
    article[data-testid="test-todo-card"]:focus-within {
      border-color: var(--border-hover);
    }
    article[data-testid="test-todo-card"].is-done {
      opacity: 0.7;
    }

    /* ── Priority indicator (left border accent) ─────── */
    .priority-indicator-bar {
      height: 4px;
      width: 100%;
      border-radius: 0;
      transition: background 0.25s ease;
    }
    [data-testid="test-todo-priority-indicator"][data-priority="High"]  { background: var(--pri-indicator-high); }
    [data-testid="test-todo-priority-indicator"][data-priority="Medium"]{ background: var(--pri-indicator-med); }
    [data-testid="test-todo-priority-indicator"][data-priority="Low"]   { background: var(--pri-indicator-low); }

    .card-inner {
      padding: 1.5rem;
    }

    /* ── Card header ─────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .check-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      margin-top: 3px;
    }

    /* ── Checkbox ─────────────────────────────────────── */
    .input {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border-hover);
      border-radius: 6px;
      cursor: pointer;
      background: var(--card-bg);
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
      position: relative;
    }
    .input:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }
    .input:hover { border-color: var(--accent); }
    .input:checked { background: var(--accent); border-color: var(--accent); }
    .input:checked::after {
      content: '';
      position: absolute;
      left: 5px; top: 2px;
      width: 6px; height: 10px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* ── Title group ─────────────────────────────────── */
    .title-group { flex: 1; min-width: 0; }
    h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--text-1);
      line-height: 1.35;
      word-break: break-word;
      transition: color 0.2s, text-decoration 0.2s;
    }
    h2.struck { text-decoration: line-through; color: var(--text-3); }

    /* ── Badges row ──────────────────────────────────── */
    .priority-status {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    span[data-testid="test-todo-priority"] {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 3px 9px;
      border-radius: var(--radius-badge);
      border: 1px solid;
      line-height: 1.5;
    }
    .pri-High   { background: var(--high-bg); color: var(--high-text); border-color: var(--high-border); }
    .pri-Medium { background: var(--med-bg);  color: var(--med-text);  border-color: var(--med-border);  }
    .pri-Low    { background: var(--low-bg);  color: var(--low-text);  border-color: var(--low-border);  }

    span[data-testid="test-todo-status"] {
      font-size: 11px; font-weight: 500;
      padding: 3px 9px;
      border-radius: var(--radius-badge);
      border: 1px solid transparent;
      line-height: 1.5;
    }
    .status-Pending    { background: var(--pending-bg);  color: var(--pending-text);  }
    .status-InProgress { background: var(--progress-bg); color: var(--progress-text); }
    .status-Done       { background: var(--done-bg);     color: var(--done-text);     }

    /* ── Status control (segmented) ──────────────────── */
    .status-control-wrap {
      margin-top: 10px;
    }
    .status-control-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-3);
      display: block;
      margin-bottom: 5px;
    }
    [data-testid="test-todo-status-control"] {
      display: inline-flex;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-badge);
      overflow: hidden;
      background: var(--page-bg);
    }
    [data-testid="test-todo-status-control"] button {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      padding: 4px 11px;
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-radius: 0;
    }
    [data-testid="test-todo-status-control"] button:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: -2px;
    }
    [data-testid="test-todo-status-control"] button.active-Pending {
      background: var(--pending-bg); color: var(--pending-text); font-weight: 600;
    }
    [data-testid="test-todo-status-control"] button.active-InProgress {
      background: var(--progress-bg); color: var(--progress-text); font-weight: 600;
    }
    [data-testid="test-todo-status-control"] button.active-Done {
      background: var(--done-bg); color: var(--done-text); font-weight: 600;
    }

    /* ── Description ─────────────────────────────────── */
    .desc-wrap { padding-left: 32px; margin-bottom: 1.1rem; }

    [data-testid="test-todo-collapsible-section"] {
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    [data-testid="test-todo-collapsible-section"].collapsed {
      max-height: 3.6em; /* ~2 lines */
    }
    [data-testid="test-todo-collapsible-section"].expanded {
      max-height: 600px;
    }

    p[data-testid="test-todo-description"] {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.65;
    }

    [data-testid="test-todo-expand-toggle"] {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500;
      color: var(--accent-text);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    [data-testid="test-todo-expand-toggle"]:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
      border-radius: 4px;
    }
    [data-testid="test-todo-expand-toggle"] .chevron {
      display: inline-block;
      transition: transform 0.25s ease;
      font-style: normal;
    }
    [data-testid="test-todo-expand-toggle"][aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }

    /* ── Meta ────────────────────────────────────────── */
    .meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding-left: 32px;
      margin-bottom: 1.1rem;
      align-items: flex-start;
    }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }
    .meta-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-3);
    }
    time[data-testid="test-todo-due-date"] {
      font-size: 13px; color: var(--text-1); font-weight: 500;
    }
    [data-testid="test-todo-time-remaining"] {
      font-size: 13px; color: var(--accent-text); font-weight: 500;
    }
    [data-testid="test-todo-time-remaining"].is-overdue {
      color: var(--overdue-text);
    }
    [data-testid="test-todo-time-remaining"].is-done {
      color: var(--done-text);
    }

    /* ── Overdue indicator ───────────────────────────── */
    [data-testid="test-todo-overdue-indicator"] {
      display: none;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      padding: 3px 9px;
      border-radius: var(--radius-badge);
      background: var(--overdue-bg);
      color: var(--overdue-text);
      border: 1px solid var(--overdue-border);
      line-height: 1.5;
    }
    [data-testid="test-todo-overdue-indicator"].visible {
      display: inline-block;
    }

    /* ── Tags ────────────────────────────────────────── */
    ul[data-testid="test-todo-tags"] {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-left: 32px;
      margin-bottom: 1.25rem;
    }
    ul[data-testid="test-todo-tags"] li {
      font-size: 12px; font-weight: 500;
      padding: 4px 11px;
      background: var(--page-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-badge);
      color: var(--text-2);
      white-space: nowrap;
    }

    /* ── Action buttons ──────────────────────────────── */
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 0.5px solid var(--border);
      padding-top: 1rem;
    }
    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 7px 16px;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      border: 0.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-1);
    }
    button:hover { background: var(--page-bg); }
    button:active { transform: scale(0.97); }
    button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }

    .btn-delete { color: var(--high-text); border-color: var(--high-border); }
    .btn-delete:hover { background: var(--high-bg); }

    /* ── Edit form ───────────────────────────────────── */
    [data-testid="test-todo-edit-form"] {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 1.25rem;
    }
    [data-testid="test-todo-edit-form"].visible {
      display: flex;
    }

    .view-mode { display: block; }
    .view-mode.hidden { display: none; }

    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-3);
    }
    .form-field input,
    .form-field textarea,
    .form-field select {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-1);
      background: var(--page-bg);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-btn);
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus {
      border-color: var(--accent);
      background: var(--accent-bg);
    }
    .form-field textarea { resize: vertical; min-height: 72px; line-height: 1.55; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    [data-testid="test-todo-save-button"] {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    [data-testid="test-todo-save-button"]:hover {
      background: var(--accent-text);
      border-color: var(--accent-text);
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      body { padding: 1.25rem 0.75rem; }
      article[data-testid="test-todo-card"] { border-radius: 12px; }
      .card-inner { padding: 1.25rem; }
      h2 { font-size: 1.05rem; }
      .desc-wrap,
      .meta,
      ul[data-testid="test-todo-tags"] { padding-left: 0; }
      .form-row { grid-template-columns: 1fr; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 769px) {
      .form-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <article
    data-testid="test-todo-card"
    role="region"
    aria-label="Todo task: Redesign landing page hero section"
  >
    <!-- Priority indicator bar -->
    <div
      data-testid="test-todo-priority-indicator"
      class="priority-indicator-bar"
      data-priority="High"
      aria-hidden="true"
    ></div>

    <div class="card-inner">

      <!-- ── VIEW MODE ── -->
      <div class="view-mode" id="view-mode">

        <!-- Header: checkbox + title + badges -->
        <div class="card-header">
          <div class="check-wrap">
            <label for="todo-toggle" class="sr-only">Mark task as complete</label>
            <input
              type="checkbox"
              id="todo-toggle"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
              class="input"
            />
          </div>

          <div class="title-group">
            <h2 data-testid="test-todo-title">Redesign landing page hero section</h2>
            <div class="priority-status">
              <span
                data-testid="test-todo-priority"
                class="pri-High"
                aria-label="Priority: High"
              >High</span>
              <span
                data-testid="test-todo-status"
                class="status-InProgress"
                aria-label="Status: In Progress"
              >In Progress</span>
              <span
                data-testid="test-todo-overdue-indicator"
                aria-label="Task is overdue"
              >Overdue</span>
            </div>

            <!-- Status control -->
            <div class="status-control-wrap">
              <span class="status-control-label" id="status-control-label">Status</span>
              <div
                data-testid="test-todo-status-control"
                role="group"
                aria-labelledby="status-control-label"
              >
                <button type="button" data-status="Pending">Pending</button>
                <button type="button" data-status="InProgress" class="active-InProgress">In Progress</button>
                <button type="button" data-status="Done">Done</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Description (collapsible) -->
        <div class="desc-wrap">
          <div
            data-testid="test-todo-collapsible-section"
            id="todo-collapsible"
            class="collapsed"
          >
            <p data-testid="test-todo-description">
              Update the hero with the new brand direction — revised headline copy,
              refreshed illustration, and CTA button colour per the design system update.
            </p>
          </div>
          <button
            data-testid="test-todo-expand-toggle"
            aria-expanded="false"
            aria-controls="todo-collapsible"
            id="expand-toggle"
            type="button"
          >
            <span id="expand-label">Show more</span>
            <i class="chevron" aria-hidden="true">▾</i>
          </button>
        </div>

        <!-- Due date + Time remaining -->
        <div class="meta">
          <div class="meta-item">
            <span class="meta-label">Due date</span>
            <time
              data-testid="test-todo-due-date"
              datetime="2026-04-16T17:00:00Z"
            >Apr 16, 2026</time>
          </div>
          <div class="meta-item">
            <span class="meta-label">Time remaining</span>
            <span
              data-testid="test-todo-time-remaining"
              id="time-remaining"
              aria-live="polite"
              aria-atomic="true"
              aria-label="Time remaining"
            >Calculating…</span>
          </div>
        </div>

        <!-- Tags -->
        <ul data-testid="test-todo-tags" role="list" aria-label="Tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li>design</li>
        </ul>

      </div><!-- /view-mode -->

      <!-- ── EDIT FORM ── -->
      <form
        data-testid="test-todo-edit-form"
        id="edit-form"
        novalidate
        onsubmit="return false"
      >
        <div class="form-field">
          <label for="edit-title">Title</label>
          <input
            type="text"
            id="edit-title"
            data-testid="test-todo-edit-title-input"
            placeholder="Task title"
          />
        </div>

        <div class="form-field">
          <label for="edit-description">Description</label>
          <textarea
            id="edit-description"
            data-testid="test-todo-edit-description-input"
            placeholder="Describe the task…"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority" data-testid="test-todo-edit-priority-select">
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>

          <div class="form-field">
            <label for="edit-due-date">Due date</label>
            <input
              type="date"
              id="edit-due-date"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>
        </div>

        <div class="edit-actions">
          <button
            type="button"
            data-testid="test-todo-cancel-button"
            id="cancel-btn"
          >Cancel</button>
          <button
            type="submit"
            data-testid="test-todo-save-button"
            id="save-btn"
          >Save</button>
        </div>
      </form>

      <!-- ── ACTIONS ── -->
      <div class="card-actions">
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          id="edit-btn"
          type="button"
        >Edit</button>
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          class="btn-delete"
          id="delete-btn"
          type="button"
        >Delete</button>
      </div>

    </div><!-- /card-inner -->
  </article>

  <script>
    /* ──────────────────────────────────────────────────
       STATE
    ────────────────────────────────────────────────── */
    const state = {
      title:       'Redesign landing page hero section',
      description: 'Update the hero with the new brand direction — revised headline copy, refreshed illustration, and CTA button colour per the design system update.',
      priority:    'High',
      status:      'InProgress',
      dueDate:     '2026-04-16',
      dueISO:      '2026-04-16T17:00:00Z',
      isDone:      false,
    };

    /* ──────────────────────────────────────────────────
       ELEMENT REFS
    ────────────────────────────────────────────────── */
    const card         = document.querySelector('[data-testid="test-todo-card"]');
    const titleEl      = document.querySelector('[data-testid="test-todo-title"]');
    const descEl       = document.querySelector('[data-testid="test-todo-description"]');
    const priorityBadge= document.querySelector('[data-testid="test-todo-priority"]');
    const statusBadge  = document.querySelector('[data-testid="test-todo-status"]');
    const priorityBar  = document.querySelector('[data-testid="test-todo-priority-indicator"]');
    const overdueBadge = document.querySelector('[data-testid="test-todo-overdue-indicator"]');
    const timeEl       = document.getElementById('time-remaining');
    const dueDateEl    = document.querySelector('[data-testid="test-todo-due-date"]');
    const checkbox     = document.querySelector('[data-testid="test-todo-complete-toggle"]');
    const statusBtns   = document.querySelectorAll('[data-testid="test-todo-status-control"] button');
    const viewMode     = document.getElementById('view-mode');
    const editForm     = document.querySelector('[data-testid="test-todo-edit-form"]');
    const editBtn      = document.getElementById('edit-btn');
    const deleteBtn    = document.getElementById('delete-btn');
    const cancelBtn    = document.getElementById('cancel-btn');
    const saveBtn      = document.getElementById('save-btn');
    const editTitle    = document.querySelector('[data-testid="test-todo-edit-title-input"]');
    const editDesc     = document.querySelector('[data-testid="test-todo-edit-description-input"]');
    const editPriority = document.querySelector('[data-testid="test-todo-edit-priority-select"]');
    const editDueDate  = document.querySelector('[data-testid="test-todo-edit-due-date-input"]');
    const collapsible  = document.querySelector('[data-testid="test-todo-collapsible-section"]');
    const expandToggle = document.querySelector('[data-testid="test-todo-expand-toggle"]');
    const expandLabel  = document.getElementById('expand-label');

    /* ──────────────────────────────────────────────────
       COLLAPSE / EXPAND
    ────────────────────────────────────────────────── */
    const COLLAPSE_THRESHOLD = 120; // chars

    function initCollapse() {
      if (state.description.length <= COLLAPSE_THRESHOLD) {
        collapsible.classList.remove('collapsed');
        collapsible.classList.add('expanded');
        expandToggle.style.display = 'none';
      } else {
        collapsible.classList.add('collapsed');
        collapsible.classList.remove('expanded');
        expandToggle.style.display = 'inline-flex';
        expandToggle.setAttribute('aria-expanded', 'false');
        expandLabel.textContent = 'Show more';
      }
    }

    expandToggle.addEventListener('click', () => {
      const expanded = expandToggle.getAttribute('aria-expanded') === 'true';
      if (expanded) {
        collapsible.classList.remove('expanded');
        collapsible.classList.add('collapsed');
        expandToggle.setAttribute('aria-expanded', 'false');
        expandLabel.textContent = 'Show more';
      } else {
        collapsible.classList.remove('collapsed');
        collapsible.classList.add('expanded');
        expandToggle.setAttribute('aria-expanded', 'true');
        expandLabel.textContent = 'Show less';
      }
    });

    /* ──────────────────────────────────────────────────
       TIME REMAINING
    ────────────────────────────────────────────────── */
    function formatTimeRemaining() {
      if (state.isDone) return 'Completed';

      const due  = new Date(state.dueISO);
      const diff = due - Date.now();
      const abs  = Math.abs(diff);
      const mins = Math.floor(abs / 60_000);
      const hrs  = Math.floor(mins / 60);
      const days = Math.floor(hrs  / 24);

      if (diff < 0) {
        if (mins < 60)  return `Overdue by ${mins} min${mins !== 1 ? 's' : ''}`;
        if (hrs  < 24)  return `Overdue by ${hrs} hr${hrs !== 1 ? 's' : ''}`;
        return                 `Overdue by ${days} day${days !== 1 ? 's' : ''}`;
      }
      if (mins < 60)    return 'Due now!';
      if (hrs  < 24)    return `Due in ${hrs} hr${hrs !== 1 ? 's' : ''}`;
      if (days === 1)   return 'Due tomorrow';
      return                   `Due in ${days} day${days !== 1 ? 's' : ''}`;
    }

    function isOverdue() {
      if (state.isDone) return false;
      return new Date(state.dueISO) < Date.now();
    }

    function updateTime() {
      const text     = formatTimeRemaining();
      const overdue  = isOverdue();

      timeEl.textContent = text;
      timeEl.className   = '';
      if (state.isDone)   timeEl.classList.add('is-done');
      else if (overdue)   timeEl.classList.add('is-overdue');

      if (overdue) {
        overdueBadge.classList.add('visible');
      } else {
        overdueBadge.classList.remove('visible');
      }
    }

    /* ──────────────────────────────────────────────────
       APPLY STATUS (visual sync)
    ────────────────────────────────────────────────── */
    function applyStatus(status) {
      state.status = status;
      state.isDone = (status === 'Done');

      /* Badge */
      const labelMap = { Pending: 'Pending', InProgress: 'In Progress', Done: 'Done' };
      statusBadge.textContent = labelMap[status];
      statusBadge.className   = `status-${status}`;
      statusBadge.setAttribute('aria-label', `Status: ${labelMap[status]}`);

      /* Segmented control */
      statusBtns.forEach(btn => {
        btn.className = btn.dataset.status === status ? `active-${status}` : '';
      });

      /* Checkbox */
      checkbox.checked = state.isDone;

      /* Card done-state */
      if (state.isDone) {
        card.classList.add('is-done');
        titleEl.classList.add('struck');
      } else {
        card.classList.remove('is-done');
        titleEl.classList.remove('struck');
      }

      updateTime();
    }

    /* ──────────────────────────────────────────────────
       APPLY PRIORITY (visual sync)
    ────────────────────────────────────────────────── */
    function applyPriority(priority) {
      state.priority = priority;
      priorityBadge.textContent = priority;
      priorityBadge.className   = `pri-${priority}`;
      priorityBadge.setAttribute('aria-label', `Priority: ${priority}`);
      priorityBar.dataset.priority = priority;
    }

    /* ──────────────────────────────────────────────────
       APPLY DUE DATE
    ────────────────────────────────────────────────── */
    function applyDueDate(dateStr) {
      state.dueDate = dateStr;
      state.dueISO  = dateStr + 'T17:00:00Z';

      const d = new Date(dateStr + 'T00:00:00');
      const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      dueDateEl.textContent  = formatted;
      dueDateEl.setAttribute('datetime', state.dueISO);
      updateTime();
    }

    /* ──────────────────────────────────────────────────
       EDIT MODE
    ────────────────────────────────────────────────── */
    function openEditMode() {
      editTitle.value    = state.title;
      editDesc.value     = state.description;
      editPriority.value = state.priority;
      editDueDate.value  = state.dueDate;

      viewMode.classList.add('hidden');
      editForm.classList.add('visible');
      editBtn.style.display    = 'none';
      deleteBtn.style.display  = 'none';

      editTitle.focus();
    }

    function closeEditMode() {
      editForm.classList.remove('visible');
      viewMode.classList.remove('hidden');
      editBtn.style.display   = '';
      deleteBtn.style.display = '';
      editBtn.focus();
    }

    function saveEdit() {
      const newTitle = editTitle.value.trim();
      const newDesc  = editDesc.value.trim();

      if (!newTitle) { editTitle.focus(); return; }

      /* Update state + DOM */
      state.title       = newTitle;
      state.description = newDesc;

      titleEl.textContent = state.title;
      descEl.textContent  = state.description;
      card.setAttribute('aria-label', `Todo task: ${state.title}`);

      applyPriority(editPriority.value);
      applyDueDate(editDueDate.value);
      initCollapse();
      closeEditMode();
    }

    /* ──────────────────────────────────────────────────
       FOCUS TRAP (edit form)
    ────────────────────────────────────────────────── */
    editForm.addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      const focusable = editForm.querySelectorAll('input, textarea, select, button');
      const first = focusable[0];
      const last  = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    });

    /* ──────────────────────────────────────────────────
       EVENT LISTENERS
    ────────────────────────────────────────────────── */

    /* Checkbox */
    checkbox.addEventListener('change', () => {
      applyStatus(checkbox.checked ? 'Done' : 'Pending');
    });

    /* Segmented status control */
    statusBtns.forEach(btn => {
      btn.addEventListener('click', () => applyStatus(btn.dataset.status));
    });

    /* Edit */
    editBtn.addEventListener('click', openEditMode);
    cancelBtn.addEventListener('click', closeEditMode);
    saveBtn.addEventListener('click', saveEdit);

    /* Allow Escape to cancel edit */
    editForm.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeEditMode();
    });

    /* Delete */
    deleteBtn.addEventListener('click', () => {
      if (confirm('Delete this task?')) {
        card.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        card.style.opacity    = '0';
        card.style.transform  = 'scale(0.97)';
        setTimeout(() => card.remove(), 300);
      }
    });

    /* ──────────────────────────────────────────────────
       INIT
    ────────────────────────────────────────────────── */
    initCollapse();
    updateTime();
    setInterval(updateTime, 45_000);
  </script>

</body>
</html>
